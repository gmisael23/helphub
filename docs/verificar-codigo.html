<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <link rel="stylesheet" href="navbar.css"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="shortcut icon" href="Imagens/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="helphub.css"/>
  <title>HelpHub – Verificar Código</title>
</head>
<body>
  <header>
    <nav>
      <a class="logo" href="index.html">
        <img src="Imagens/logoHH.png" alt="HelpHub" height="36">
      </a>
      <div class="nav-links">
        <a href="index.html" class="active">HOME</a>
        <a href="agendas_consultas_vestibulares_etc/home.html#page-conteudos">CONTEÚDOS</a>
        <a href="agendas_consultas_vestibulares_etc/home.html#page-agenda">AGENDA</a>
        <a href="agendas_consultas_vestibulares_etc/home.html#page-vestibulares">VESTIBULARES</a>
        <a href="agendas_consultas_vestibulares_etc/home.html#page-contato">CONTATO</a>
        <a href="agendas_consultas_vestibulares_etc/home.html#page-sobre">SOBRE</a>
      </div>
      <div class="nav-actions">
        <a href="login.html">
          <button class="btn-login">LOGIN</button>
        </a>
        <a href="cadastro.html">
          <button class="btn-participe">PARTICIPE</button>
        </a>
      </div>
    </nav>
  </header>

  <div class="page-body">
    <p class="page-hint">Não é cadastrado? <a href="cadastro.html">Cadastre-se AQUI!</a></p>
    <div class="form-card">
      <div class="card-title">Esqueci minha senha</div>
      <p class="card-sub">Insira o Código enviado por Email</p>
      <div class="code-inputs">
        <input type="text" maxlength="1" oninput="nextInput(this)" id="c1">
        <input type="text" maxlength="1" oninput="nextInput(this)" id="c2">
        <input type="text" maxlength="1" oninput="nextInput(this)" id="c3">
        <input type="text" maxlength="1" oninput="nextInput(this)" id="c4">
        <input type="text" maxlength="1" oninput="nextInput(this)" id="c5">
        <input type="text" maxlength="1" oninput="nextInput(this)" id="c6">
      </div>
      <p class="resend">Não recebeu o código? <a href="#">Reenviar</a></p>
      <button class="btn-submit" onclick="window.location.href='login.html'">Recuperar Senha</button>
      <div class="back-link"><a href="esqueci-senha.html">← Voltar</a></div>
    </div>
  </div>

  <footer>© 2026 Projeto de Apoio Educacional – Universidade Cidade de São Paulo</footer>

  <script>
    function nextInput(el) {
      if (el.value.length === 1) {
        const inputs = document.querySelectorAll('.code-inputs input');
        const idx = Array.from(inputs).indexOf(el);
        if (idx < inputs.length - 1) inputs[idx + 1].focus();
      }
    }
    document.querySelectorAll('.code-inputs input').forEach(inp => {
      inp.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !inp.value) {
          const inputs = document.querySelectorAll('.code-inputs input');
          const idx = Array.from(inputs).indexOf(inp);
          if (idx > 0) inputs[idx - 1].focus();
        }
      });
    });
  </script>
</body>
</html>
